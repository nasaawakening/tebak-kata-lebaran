<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakso Battle: Sensor Mode</title>
    <style>
        :root { --primary: #d84315; --correct: #4caf50; --wrong: #f44336; }
        body { font-family: 'Arial', sans-serif; margin: 0; background: #ff9800; color: white; transition: background 0.3s; overflow: hidden; }
        .container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; padding: 20px; }
        
        #word-display { font-size: 5rem; font-weight: 900; text-transform: uppercase; line-height: 1.1; margin: 20px 0; }
        .instruction { font-size: 1.2rem; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 50px; position: absolute; bottom: 50px; }
        
        #setup, #lobby, #play, #result { display: none; width: 100%; }
        .btn { padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 50px; cursor: pointer; background: white; color: var(--primary); font-weight: bold; margin: 10px; }
        textarea { width: 80%; height: 60px; border-radius: 10px; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" style="display:block;">
        <h1>🥨 Bakso Battle Custom</h1>
        <textarea id="inputWords" placeholder="Kata-kata rahasia (pisahkan koma)..."></textarea>
        <br>
        <button class="btn" onclick="generateLink()">BUAT LINK GAME</button>
        <div id="link-res" style="word-break:break-all; font-size:10px; margin-top:10px;"></div>
    </div>

    <div id="lobby">
        <h1>SIAP MAIN?</h1>
        <p>Tegakkan HP di dahi menghadap teman.</p>
        <p>✅ <b>Tundukkan ke depan</b> untuk BENAR</p>
        <p>❌ <b>Tengadahkan ke belakang</b> untuk LEWAT</p>
        <button class="btn" onclick="requestPermission()">MULAI GAME</button>
    </div>

    <div id="play">
        <h2 id="timer">60</h2>
        <div id="word-display">...</div>
        <div class="instruction" id="status-hint">Posisikan HP Tegak</div>
    </div>

    <div id="result">
        <h1>WAKTU HABIS!</h1>
        <h2 id="final-score" style="font-size: 4rem;">0</h2>
        <button class="btn" onclick="location.reload()">MAIN LAGI</button>
    </div>
</div>

<script>
    let words = [];
    let score = 0;
    let timeLeft = 60;
    let isGameActive = false;
    let lastTilt = 0; // 0: upright, 1: correct, 2: skip

    const params = new URLSearchParams(window.location.search);
    if(params.get('room')) {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('lobby').style.display = 'block';
        words = JSON.parse(atob(params.get('room'))).sort(() => Math.random() - 0.5);
    }

    function generateLink() {
        const txt = document.getElementById('inputWords').value || "Bakso,Tetelan,THR,Nastar";
        const link = window.location.origin + window.location.pathname + "?room=" + btoa(JSON.stringify(txt.split(',')));
        document.getElementById('link-res').innerText = "Kirim link ini: " + link;
    }

    function requestPermission() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(response => { if (response == 'granted') startGame(); })
                .catch(console.error);
        } else {
            startGame();
        }
    }

    function startGame() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('play').style.display = 'flex';
        isGameActive = true;
        nextWord();
        
        setInterval(() => {
            if(!isGameActive) return;
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) endGame();
        }, 1000);

        window.addEventListener('deviceorientation', handleMotion);
    }

    function handleMotion(event) {
        if (!isGameActive) return;
        let tilt = event.beta; // Kemiringan depan-belakang

        // Deteksi posisi
        if (tilt > 110 && lastTilt !== 1) { // Menunduk ke depan (Benar)
            document.body.style.background = "#4caf50";
            document.getElementById('word-display').innerText = "BERHASIL!";
            score++;
            lastTilt = 1;
            setTimeout(nextWord, 600);
        } else if (tilt < 60 && lastTilt !== 2) { // Menengadah ke belakang (Lewat)
            document.body.style.background = "#f44336";
            document.getElementById('word-display').innerText = "LEWAT!";
            lastTilt = 2;
            setTimeout(nextWord, 600);
        } else if (tilt >= 75 && tilt <= 100) { // Posisi tegak kembali
            document.body.style.background = "#ff9800";
            lastTilt = 0;
        }
    }

    function nextWord() {
        if (words.length === 0) return endGame();
        document.getElementById('word-display').innerText = words.pop();
    }

    function endGame() {
        isGameActive = false;
        document.getElementById('play').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('final-score').innerText = "Skor: " + score;
        document.body.style.background = "#d84315";
    }
</script>
</body>
</html>
